name: dbt PR Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  dbt_compile:
    name: Run dbt Compile & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: dbt compile
        run: |
          cd dbt_project
          dbt deps
          dbt compile --target dev
        env:
          DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
          DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
          DBT_PG_PASS: ${{ secrets.DBT_PG_PASS }}
          DBT_PG_DB: ${{ secrets.DBT_PG_DB }}
          DBT_PG_PORT: 5432
