version: 2

models:
  - name: mart_consultas
    description: >
      Consultas ambulatorias con todos los datos pre-unidos: paciente, médico,
      servicio, hospital, región y distrito del hospital, datos clínicos (motivo, historia, impresión diagnóstica),
      tipo de consulta, destino del paciente, y residencia del paciente (departamento, distrito, barrio).
      Para consultas de hoy: SELECT * FROM mart_consultas WHERE fecha_consulta = CURRENT_DATE.
      Para consultas por servicio: SELECT servicio, COUNT(*) FROM mart_consultas GROUP BY servicio.

  - name: mart_diagnosticos_ambulatorios
    description: >
      Diagnósticos CIE-10 de consultas ambulatorias con la jerarquía completa
      pre-unida (capítulo > grupo > subgrupo > diagnóstico) e información de región y distrito del hospital,
      además de la residencia del paciente (departamento, distrito, barrio).
      Para los diagnósticos más frecuentes: SELECT diagnostico, COUNT(*) FROM mart_diagnosticos_ambulatorios GROUP BY diagnostico ORDER BY COUNT(*) DESC.
      Para diagnósticos por capítulo CIE-10: GROUP BY capitulo_cie10.

  - name: mart_medicamentos_recetados
    description: >
      Medicamentos recetados en consultas ambulatorias con catálogo pre-unido.
      Incluye nombre del medicamento, dosis, instrucciones, días de tratamiento,
      cantidad recetada vs dispensada, y estado de la receta.
      Excluye recetas eliminadas.
      Para medicamentos más recetados: SELECT medicamento, COUNT(*) FROM mart_medicamentos_recetados GROUP BY medicamento ORDER BY COUNT(*) DESC.

  - name: mart_signos_vitales
    description: >
      Signos vitales registrados en triaje/preconsulta.
      Incluye: peso, talla, IMC, temperatura, presión arterial (sistólica/diastólica),
      pulso, frecuencia respiratoria, saturación O2, estado nutricional,
      datos de embarazo, y medidas pediátricas.

  - name: mart_totales_consultas_por_tipo
    description: >
      Vista materializada que agrupa la cantidad total de consultas y cantidad total de pacientes distintos,
      agrupados por fecha de consulta, establecimiento, región, y tipo de consulta
      (Ambulatoria, Urgencia, Teleconsulta, Internación, etc.).
      Ideal para preguntas estadísticas globales sobre rendimiento por hospital.

  - name: mart_diagnosticos_top_diarios
    description: >
      Vista materializada que cuenta la cantidad de veces que se registra cada diagnóstico CIE-10
      por fecha y establecimiento.
      Ideal para saber cuál es el diagnóstico más repetido de un día en particular en un hospital.

  - name: mart_establecimientos_resumen
    description: >
      Vista materializada con un resumen de actividad por establecimiento.
      Incluye la fecha de su primera consulta, última consulta, y el total acumulado de pacientes atendidos.
      También indica la región y el departamento al que pertenecen.
