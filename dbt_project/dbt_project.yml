name: 'RAG_ai_analytics'
version: '1.0.0'
config-version: 2

profile: 'RAG_ai_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# All models are views for real-time data (no cron needed).
# dbt run only needs to execute when model definitions change.
models:
  RAG_ai_analytics:
    +materialized: view
    staging:
      +tags: ["staging"]
    intermediate:
      +tags: ["intermediate"]
    marts:
      +materialized: table
      ambulatoria:
        +tags: ["ambulatoria"]
      internacion:
        +tags: ["internacion"]
